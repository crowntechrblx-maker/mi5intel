databases:
  - name: roblox-intelligence-db-pg
    databaseName: roblox_intelligence
    user: roblox_admin
    plan: free

services:
  - type: web
    name: roblox-intelligence-db
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: SETUP_TOKEN
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: roblox-intelligence-db-pg
          property: connectionString
